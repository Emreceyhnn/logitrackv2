<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1d4ed8",
                        "background-light": "#f8f6f6",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center font-display text-slate-900 dark:text-slate-100 p-4">
<div class="w-full max-w-[440px] flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-10 flex flex-col items-center gap-3">
<div class="size-16 bg-primary/20 rounded-xl flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-4xl">local_shipping</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">LogiTrack</h1>
<p class="text-slate-500 dark:text-slate-400 text-center">Streamlining your supply chain with real-time intelligence</p>
</div>
<!-- Login Card -->
<div class="w-full bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl shadow-xl p-8 backdrop-blur-sm">
<h2 class="text-xl font-semibold mb-6 text-slate-900 dark:text-white">Sign In</h2>
<form class="flex flex-col gap-5" onsubmit="return false;">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">mail</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:text-white placeholder:text-slate-400" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Password</label>
<a class="text-xs font-semibold text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input class="w-full pl-10 pr-12 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:text-white placeholder:text-slate-400" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-2">
<input class="size-4 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary bg-slate-50 dark:bg-slate-800" id="remember" type="checkbox"/>
<label class="text-sm text-slate-600 dark:text-slate-400 select-none" for="remember">Stay logged in for 30 days</label>
</div>
<!-- Login Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3 px-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Login to Dashboard</span>
<span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- SSO Options -->
<div class="mt-8 flex flex-col gap-4">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-slate-900 px-2 text-slate-500 dark:text-slate-400">Or continue with</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-2 px-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
<img alt="Google logo" class="size-5" data-alt="Google company icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBVX3CfAbcUhOj0K_JllDPqc6B-q_P6UUHNvAMxgewFyPKKO7fSaM_LIBAlofsFG0Nx148Qf8fmsPCsfIe43AoOziQDTOt0bRkdaw3UlSX_P3j2Jfq6_ndIXXCIAsgJnz05NnO0c6Gp4bEnM8-7bKZEqL1sFMdoe7V3YQ4glVABj1PMcyCcfFgGxkBUwBFOj1zWaqHG9ErnnQwIEzAwMN5EG66JGRTn9-LTv100tjPK42Pqz_KBbfUptzzNpGwJB8v8-t-crmtcOCI"/>
<span class="text-sm font-medium">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-2 px-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-xl">domain</span>
<span class="text-sm font-medium">SSO</span>
</button>
</div>
</div>
</div>
<!-- Footer Link -->
<p class="mt-8 text-sm text-slate-600 dark:text-slate-400">
            Don't have an account? 
            <a class="text-primary font-semibold hover:underline" href="#">Sign up for free</a>
</p>
<!-- Page Background Element (Decorative) -->
<div class="fixed -bottom-20 -right-20 size-96 bg-primary/10 rounded-full blur-3xl -z-10"></div>
<div class="fixed -top-20 -left-20 size-96 bg-blue-400/10 rounded-full blur-3xl -z-10"></div>
</div>
</body></html>
